name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # Job 1: Linting
  # Catches static style issues and syntax errors cheaply before running slower tests.
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Linter
        run: ruff check app/

  # Job 2: Testing
  # Verifies logic and correctness. Only runs if linting passes successfully.
  test:
    needs: lint
    runs-on: ubuntu-latest
    env:
      # You must add these keys in GitHub Repo -> Settings -> Secrets and variables -> Actions
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Pytest
        env:
          PYTHONPATH: .
        run: pytest tests/ -v

  # Job 3: Deploy
  # Triggers a deployment securely. Only triggers if both lint and test stages passed.
  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Exclusively restrict this deployment trigger to the main branch
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy API to Render
        env:
          RENDER_DEPLOY_HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        run: |
          echo "Triggering Render API deployment..."
          curl -X POST -fail "$RENDER_DEPLOY_HOOK_API"
          
      - name: Deploy Streamlit UI to Render
        env:
          RENDER_DEPLOY_HOOK_UI: ${{ secrets.RENDER_DEPLOY_HOOK_UI }}
        run: |
          echo "Triggering Render UI deployment..."
          curl -X POST -fail "$RENDER_DEPLOY_HOOK_UI"
